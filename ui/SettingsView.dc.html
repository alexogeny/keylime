<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="./shared.css">
<script src="./support.js"></script><script src="./keylime-api.js"></script>
<script src="./shared-components.js"></script></head>
<body><x-dc>
<div style="height:100%;overflow:auto;background:#131210;color:#d8d3c7;font-family:'IBM Plex Mono',monospace;padding:18px;">
  <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:14px;"><div><div style="font-size:11px;color:#9c968a;letter-spacing:.12em;text-transform:uppercase;">Settings</div><div style="font-size:18px;color:#e3ddd0;">Profile + harness defaults</div></div><button onClick="{{ save }}" style="background:#1f1c18;border:1px solid rgba(255,255,255,.1);color:#b3c46e;padding:6px 10px;font-family:inherit;">save</button></div>
  <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px;">
    <section style="border:1px solid rgba(255,255,255,.07);background:#161412;padding:14px;"><h3 style="margin:0 0 10px;color:#e3ddd0;">Profile</h3><textarea value="{{ profileText }}" onChange="{{ editProfile }}" style="width:100%;min-height:120px;background:#0f0e0d;color:#cdc8bc;border:1px solid rgba(255,255,255,.08);font-family:inherit;"></textarea></section>
    <section style="border:1px solid rgba(255,255,255,.07);background:#161412;padding:14px;"><h3 style="margin:0 0 10px;color:#e3ddd0;">Agent defaults</h3><textarea value="{{ agentText }}" onChange="{{ editAgent }}" style="width:100%;min-height:120px;background:#0f0e0d;color:#cdc8bc;border:1px solid rgba(255,255,255,.08);font-family:inherit;"></textarea></section>
  </div>
</div>
</x-dc><script type="text/x-dc" data-dc-script>
class Component extends DCLogic { state={settings:{},profileText:'{}',agentText:'{}'}; componentDidMount(){this.load()} async load(){const s=await KeylimeAPI.get('/api/settings').catch(()=>({}));this.setState({settings:s,profileText:JSON.stringify(s.profile||{},null,2),agentText:JSON.stringify(s.agentDefaults||{},null,2)})} editProfile=(e)=>this.setState({profileText:e.target.value}); editAgent=(e)=>this.setState({agentText:e.target.value}); save=()=>KeylimeAPI.patch('/api/settings',{profile:JSON.parse(this.state.profileText||'{}'),agent:JSON.parse(this.state.agentText||'{}')}); renderVals(){return {...this.state,editProfile:this.editProfile,editAgent:this.editAgent,save:this.save}}}
</script></body></html>
