<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./shared.css">
<script src="./support.js"></script>
<script src="./keylime-api.js"></script>
<script src="./shared-components.js"></script>
</head>
<body>
<x-dc>
<div style="display: grid; grid-template-columns: 320px 1fr; height: 100%; min-height: 0;">
  <div style="border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; min-height: 0; background: #141210;">
    <div style="padding: 14px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.06);">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px;">
        <span style="font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #9c968a;">Research Library</span>
        <span style="font-size: 10px; color: #6a655c;">12 notes</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #100f0c; border: 1px solid rgba(255,255,255,0.07); border-radius: 2px;">
        <span style="color: #524e47; font-size: 12px;">⌕</span>
        <input placeholder="filter notes, tags, sources…" style="flex: 1; background: transparent; border: none; outline: none; color: #c7c1b4; font-family: inherit; font-size: 12px;" />
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;">
        <span style="font-size: 10.5px; padding: 2px 9px; border: 1px solid rgba(154,147,180,0.3); color: #9a93b4; border-radius: 2px; background: rgba(154,147,180,0.08);">ml</span>
        <span style="font-size: 10.5px; padding: 2px 9px; border: 1px solid rgba(255,255,255,0.1); color: #9c968a; border-radius: 2px;">agents</span>
        <span style="font-size: 10.5px; padding: 2px 9px; border: 1px solid rgba(255,255,255,0.1); color: #9c968a; border-radius: 2px;">market</span>
        <span style="font-size: 10.5px; padding: 2px 9px; border: 1px solid rgba(255,255,255,0.1); color: #9c968a; border-radius: 2px;">infra</span>
      </div>
    </div>
    <div style="flex: 1; overflow-y: auto;">
      <sc-for list="{{ list }}" as="r" hint-placeholder-count="6">
        <button onClick="{{ r.select }}" style="width: 100%; text-align: left; display: flex; flex-direction: column; gap: 7px; padding: 13px 16px; background: {{ r.bg }}; border: none; border-bottom: 1px solid rgba(255,255,255,0.04); border-left: 2px solid {{ r.bar }}; cursor: pointer; font-family: inherit;" style-hover="background: #1b1815;">
          <div style="font-size: 13px; color: #d3cec2; line-height: 1.4;">{{ r.title }}</div>
          <div style="display: flex; align-items: center; gap: 10px; font-size: 10px; color: #6a655c;">
            <span style="color: {{ r.confFg }};">● {{ r.conf }}</span>
            <span>{{ r.sources }} src</span>
            <span>{{ r.claims }} claims</span>
            <span>⇆ {{ r.backlinks }}</span>
            <span style="flex: 1;"></span>
            <span>{{ r.recency }}</span>
          </div>
        </button>
      </sc-for>
    </div>
  </div>

  <div style="overflow-y: auto; min-height: 0;">
    <div style="max-width: 760px; margin: 0 auto; padding: 40px 48px 56px;">
      <div style="display: flex; align-items: center; gap: 10px; font-size: 11px; color: #6a655c; margin-bottom: 18px;">
        <span style="color: #9a93b4;">RESEARCH NOTE</span>
        <span>·</span>
        <span>auto-generated</span>
        <span>·</span>
        <span>{{ selNote.recency }}</span>
        <span style="flex: 1;"></span>
        <button style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #9c968a; padding: 3px 9px; border-radius: 2px; font-family: inherit; font-size: 10.5px; cursor: pointer;" style-hover="border-color: rgba(255,255,255,0.2); color: #d8d3c7;">⇱ open source chat</button>
      </div>
      <h1 style="font-family: 'Newsreader', serif; font-weight: 500; font-size: 33px; line-height: 1.2; color: #e6e0d3; margin: 0 0 8px; letter-spacing: -0.01em;">{{ selNote.title }}</h1>
      <div style="display: flex; gap: 7px; margin-bottom: 26px;">
        <sc-for list="{{ selNote.tags }}" as="tag" hint-placeholder-count="3">
          <span style="font-size: 10.5px; padding: 2px 9px; border: 1px solid rgba(154,147,180,0.25); color: #9a93b4; border-radius: 2px; background: rgba(154,147,180,0.06);">{{ tag }}</span>
        </sc-for>
      </div>
      <div style="font-family: 'Newsreader', serif; font-size: 18px; line-height: 1.72; color: #cfc9bc;" innerHTML="{{ detail.body }}"></div>

      <div style="margin-top: 36px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.08);">
        <div style="font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6a655c; margin-bottom: 14px;">Sources</div>
        <sc-for list="{{ detail.sources }}" as="s" hint-placeholder-count="3">
          <div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <span style="width: 20px; height: 20px; border: 1px solid rgba(154,147,180,0.3); color: #9a93b4; border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0;">{{ s.n }}</span>
            <div style="flex: 1;">
              <div style="font-size: 13px; color: #cdc8bc;">{{ s.title }}</div>
              <div style="font-size: 11px; color: #6a655c;">{{ s.host }}</div>
            </div>
            <span style="font-size: 10.5px; color: #82a98c;">● {{ s.conf }}</span>
            <span style="font-size: 11px; color: #524e47;">↗</span>
          </div>
        </sc-for>
      </div>

      <div style="margin-top: 28px;">
        <div style="font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6a655c; margin-bottom: 12px;">Related &amp; backlinks</div>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <sc-for list="{{ detail.related }}" as="rel" hint-placeholder-count="3">
            <span style="font-size: 12px; padding: 5px 12px; background: #1a1714; border: 1px solid rgba(255,255,255,0.08); color: #b6b0a4; border-radius: 2px; cursor: pointer;">⇆ {{ rel }}</span>
          </sc-for>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { selectedResearch: null, items: [], detail: null };
  componentDidMount(){ this.refresh(); this._es = KeylimeAPI.stream?.((t)=>{ if(t==='research.created') this.refresh(); }); }
  componentWillUnmount(){ this._es?.close?.(); }
  async refresh(){ const d = await KeylimeAPI.get('/api/research').catch(()=>({items:[]})); const items = d.items || d.entries || []; const selectedResearch = this.state.selectedResearch || items[0]?.id; let detail = selectedResearch ? await KeylimeAPI.get('/api/research/'+encodeURIComponent(selectedResearch)).catch(()=>null) : null; this.setState({ items, selectedResearch, detail }); }
  async select(id){ this.setState({ selectedResearch:id }); const detail = await KeylimeAPI.get('/api/research/'+encodeURIComponent(id)).catch(()=>null); this.setState({ detail }); }
  renderVals() {
    const sel = this.state.selectedResearch;
    const notes = this.state.items || [];
    const selected = notes.find(n=>n.id===sel) || notes[0] || {};
    const detail = this.state.detail || selected;
    return { list: notes.map(n => ({ ...n, tags:n.tags||[], sources:n.sources||n.sourceCount||0, claims:n.claims?.length||0, conf:n.confidence ? Math.round(n.confidence*100)+'%' : '', recency:KeylimeAPI.rel(n.recency||n.updatedAt||n.createdAt), backlinks:n.backlinks?.length||0, select:()=>this.select(n.id), bg:n.id===sel?'#1f1c18':'#161412', bar:n.id===sel?'#9a93b4':'transparent', confFg:'#82a98c' })), detail:{ body:detail.body || detail.summary || '', sources:detail.sources || [], related:detail.relatedTopics || detail.related || [] }, selNote:selected };
  }
}
</script>
</body>
</html>
